<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SehatSaathi — AI-Powered Disease Screening{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="glow-container">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>
    
    <header class="navbar">
        <div class="nav-container">
            <a href="{{ url_for('menu') }}" class="logo">
                <span class="logo-emoji">⚕️</span> SehatSaathi
            </a>
            <div class="nav-links">
                <a href="{{ url_for('menu') }}" class="nav-btn">Dashboard</a>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer">
        <div class="footer-container">
            <p>⚕️ SehatSaathi is a screening tool only — not a medical diagnosis. Consult a doctor for any flagged risk.</p>
        </div>
    </footer>

    <!-- Universal camera/mic settings overlay if needed -->
    {% block extra_scripts %}{% endblock %}
</body>
</html>
